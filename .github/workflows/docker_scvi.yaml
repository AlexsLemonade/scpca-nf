name: Build Docker images scpca-nf/scvi

concurrency:
  group: "docker_scvi_${{ github.ref }}"
  cancel-in-progress: true

# default permissions
permissions:
  contents: read
on:
  pull_request:
    branches:
      - main
      - development
    paths:
      - "docker/scvi/Dockerfile"
      - "docker/scvi/.dockerignore"
      - "docker/scvi/pixi.lock"
      - "docker/scvi/pixi.toml"
  push:
    branches:
      - main
      - development
    paths:
      - "docker/scvi/Dockerfile"
      - "docker/scvi/.dockerignore"
      - "docker/scvi/pixi.lock"
      - "docker/scvi/pixi.toml"
    tags:
      - "v*.*.*"

jobs:
  test-build:
    name: Test Build Docker Image (${{ matrix.pixi_env }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pixi_env: [ cpu, gpu ]

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:docker/scvi"
          push: false
          # allow build on cpu even if gpu image is selected
          build-args: |
            PIXI_ENV=${{ matrix.pixi_env }}
            CONDA_OVERRIDE_CUDA=${{ matrix.pixi_env == 'gpu' && '12.9' || '' }}
          cache-from: type=gha,scope=${{ matrix.pixi_env }}
          cache-to: type=gha,mode=min,scope=${{ matrix.pixi_env }},compression=zstd

  build-push:
    name: Build and Push Docker Image (${{ matrix.pixi_env }})
    if: github.event_name == 'push'
    environment: prod
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pixi_env: [ cpu, gpu ]
    env:
      IMAGE_NAME: scpca-nf/scvi
      GH_REGISTRY: ghcr.io
      GH_REGISTRY_USER: alexslemonade
      AWS_REGISTRY: "${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.us-east-1.amazonaws.com"
      AWS_PREFIX: ghcr_io
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::${{secrets.AWS_ACCOUNT_ID}}:role/gha-ecr-access-role"
          role-session-name: githubActionSession
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GH_REGISTRY }}/${{ env.GH_REGISTRY_USER }}/${{ env.IMAGE_NAME }}
            ${{ env.AWS_REGISTRY }}/${{ env.AWS_PREFIX }}/${{ env.GH_REGISTRY_USER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}},suffix=-${{ matrix.pixi_env }}
            type=edge,branch=development,suffix=-${{ matrix.pixi_env }}
            type=ref,event=branch,suffix=-${{ matrix.pixi_env }}

      - name: Docker metadata (no suffix))
        id: meta-nosuffix
        # no suffix for cpu image to be the default "latest" tag
        if: matrix.env == 'cpu'
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GH_REGISTRY }}/${{ env.GH_REGISTRY_USER }}/${{ env.IMAGE_NAME }}
            ${{ env.AWS_REGISTRY }}/${{ env.AWS_PREFIX }}/${{ env.GH_REGISTRY_USER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}
            type=edge,branch=development
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GH_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:docker/scvi"
          push: true
          build-args: |
            PIXI_ENV=${{ matrix.pixi_env }}
            CONDA_OVERRIDE_CUDA=${{ matrix.pixi_env == 'gpu' && '12.9' || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.pixi_env }}
          cache-to: type=gha,mode=min,scope=${{ matrix.pixi_env }},compression=zstd
