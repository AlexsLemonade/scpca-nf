[workspace]
authors = ["Joshua Shapiro <josh.shapiro@ccdatalab.org>"]
channels = ["conda-forge", "bioconda"]
name = "scpca-nf"
platforms = ["linux-64", "osx-64", "osx-arm64"]
version = "0.1.0"


[dependencies]
awscli = ">=2.31.37,<3"
aws-session-manager-plugin = ">=1.2.779.0,<2"
nextflow = "25.10.*"
pre-commit = ">=4.4.0,<5"
prettier = ">=3.6.2,<4"

[feature.nfcore.dependencies]
nf-core = "3.*"


[feature.sbpack.dependencies]
python = "3.11.*"
nf-core = "2.1.*"
setuptools = ">=79.0.0,<80"
"ruamel.yaml" = ">=0.16"

[feature.sbpack.pypi-dependencies]
sbpack = { git = "https://github.com/rabix/sbpack", tag = "2024.10.30" }

[environments]
default = ["nfcore"]
cavatica = ["sbpack"]
