[workspace]
channels = ["conda-forge"]
name = "scvi-cellassign"
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11,<3.13"
scvi-tools = ">=1.1.5,<2"
scanpy = ">=1.10.2,<2"
anndata = ">=0.10.8,<1"

# GPU feature
[feature.gpu]
platforms = ["linux-64"]
# CUDA version
system-requirements = {cuda = "12.9"}

[feature.gpu.dependencies]
pytorch-gpu = ">=2.9.1,<3"
cuda-version = ">=12.9,<13"



[feature.cpu.dependencies]
pytorch-cpu = ">=2.9.1,<3"

[environments]
gpu = { features = ["gpu"] }
cpu = { features = ["cpu"] }
default = { features = ["cpu"]  }
